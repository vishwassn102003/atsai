[phases.setup]
nixPkgs = [
  "python312",
  "gcc",
  "cairo",
  "pango",
  "gdk-pixbuf",
  "glib",
  "libffi",
  "pkg-config",
  "dejavu_fonts"
]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install -r requirements.txt"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
